repos:
  - repo: https://github.com/lincc-frameworks/pre-commit-hooks
    rev: v0.1.1
    hooks:
      - id: check-lincc-frameworks-template-version
        name: Check template version
        verbose: true

  - repo: local
    hooks:
      - id: jupyter-nb-clear-output
        name: Clear output from Jupyter notebooks
        files: \.ipynb$
        stages: [pre-commit]
        language: system
        entry: jupyter nbconvert --clear-output

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: no-commit-to-branch
        name: Prevent main branch commits
      - id: check-added-large-files
        name: Check for large files
        args: ['--maxkb=500']

  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.12.1
    hooks:
      - id: validate-pyproject
        name: Validate pyproject.toml

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.28.0
    hooks:
      - id: check-github-workflows
        args: ["--verbose"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.2.1
    hooks:
      - id: ruff
        name: Lint code using ruff
        types_or: [ python, pyi ]
        args: ["--fix"]
      - id: ruff-format
        name: Format code using ruff
        types_or: [ python, pyi, jupyter ]

  - repo: local
    hooks:
      - id: sphinx-build
        name: Build documentation with Sphinx
        entry: sphinx-build
        language: python
        # This fixes the "No template sub-directory with name 'rst'" error
        additional_dependencies:
          - nbsphinx>=0.8.10
          - nbconvert<7
          - sphinx-autoapi
          - lxml_html_clean
          - sphinx_copybutton
          - sphinx-design
          - sphinx_rtd_theme
        always_run: true
        exclude_types: [file, symlink]
        args:
          [
            "-M", "html",
            "./docs",
            "./_readthedocs",
            "-T", "-E",
            "-d", "./docs/_build/doctrees",
            "-D", "exclude_patterns=notebooks/*",
          ]

  - repo: local
    hooks:
      - id: pytest-check
        name: Run unit tests
        entry: env PYTHONPATH=src pytest
        language: python
        additional_dependencies: [pytest, "."]
        pass_filenames: false
        always_run: true
